// ─── 7. KV CACHE DEMO ──────────────────────────────────────────────
function KVDemo() {
const [ph,setPh]=useState(“idle”);
const [pp,setPP]=useState(0);
const [dt,setDT]=useState([]);
const [kv,setKv]=useState(0);
const [ds,setDS]=useState(-1);
const t=useRef(null);
const reset=()=>{clearInterval(t.current);setPh(“idle”);setPP(0);setDT([]);setKv(0);setDS(-1);};
const start=()=>{reset();setPh(“pf”);let p=0;t.current=setInterval(()=>{p++;setPP(p);if(p>=P_TOKENS.length){clearInterval(t.current);setKv(P_TOKENS.length);setTimeout(()=>{setPh(“dc”);let d=0;t.current=setInterval(()=>{if(d>=O_TOKENS.length){clearInterval(t.current);setPh(“done”);return;}setDT(pr=>[…pr,O_TOKENS[d]]);setKv(P_TOKENS.length+d+1);setDS(d);d++;},350);},500);}},80);};
useEffect(()=>()=>clearInterval(t.current),[]);

return <div>
<Card color={C.orange}>
<div style={{fontSize:12,fontWeight:600,color:C.orange,marginBottom:4}}>实例：”{PROMPT}”</div>
<div style={{fontSize:11,color:”#bbb”}}>点击播放，观察 Prefill 填充 KV Cache → Decode 逐 token 生成</div>
</Card>
<div style={{display:“flex”,gap:8,marginBottom:14}}>
<button onClick={start} disabled={ph===“pf”||ph===“dc”} style={{padding:“8px 18px”,borderRadius:8,fontSize:12,fontWeight:700,cursor:“pointer”,border:“1.5px solid “+C.orange,background:C.orange+“15”,color:C.orange,opacity:ph===“pf”||ph===“dc”?0.5:1}}>▶ 播放</button>
<button onClick={reset} style={{padding:“8px 14px”,borderRadius:8,fontSize:12,fontWeight:600,cursor:“pointer”,border:“1.5px solid #444”,background:“rgba(255,255,255,0.03)”,color:”#888”}}>重置</button>
{ph!==“idle”&&<Tag c={ph===“pf”?C.blue:ph===“dc”?C.orange:C.green}>{ph===“pf”?“⚡ PREFILL”:(ph===“dc”?“🔄 DECODE”:“✅ 完成”)}</Tag>}
</div>
<Card><Label>Prompt tokens</Label><div>{P_TOKENS.map((tk,i)=><Chip key={i} t={tk} idx={i} hl={pp>i} c={C.blue}/>)}</div></Card>
{ph!==“idle”&&<Card color={C.orange}>
<div style={{display:“flex”,justifyContent:“space-between”}}><Label>KV Cache</Label><span style={{fontSize:10,color:C.orange,...M}}>{kv} slots</span></div>
<div style={{height:16,background:“rgba(255,255,255,0.04)”,borderRadius:6,overflow:“hidden”,marginTop:4}}>
<div style={{height:“100%”,borderRadius:6,background:“linear-gradient(90deg,”+C.blue+”,”+C.orange+”)”,width:String(kv/(P_TOKENS.length+O_TOKENS.length)*100)+”%”,transition:“width 0.3s”}}/>
</div>
</Card>}
{(ph===“dc”||ph===“done”)&&<Card color={C.green}>
<Label>输出</Label>
<div style={{minHeight:30}}>
{dt.map((tk,i)=><Chip key={i} t={tk} hl={true} c={C.green}/>)}
{ph===“dc”&&<span style={{display:“inline-block”,width:8,height:14,background:C.orange,borderRadius:2,verticalAlign:“middle”,marginLeft:2,animation:“blink 0.8s step-end infinite”}}/>}
</div>
{(ph===“dc”&&ds>=0)&&<div style={{fontSize:10,color:”#888”,marginTop:6,padding:“6px 8px”,background:C.orange+“08”,borderRadius:6}}>{“第”+(ds+1)+“步：Q×KV[”+(kv-1)+“条] → "”+O_TOKENS[ds]+”" → Cache=”+kv+“条”}</div>}
</Card>}

  </div>;
}
