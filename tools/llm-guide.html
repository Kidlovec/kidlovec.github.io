// ─── 7. KV CACHE DEMO ──────────────────────────────────────────────
function KVDemo() {
const [ph,setPh]=useState("idle");
const [pp,setPP]=useState(0);
const [dt,setDT]=useState([]);
const [kv,setKv]=useState(0);
const [ds,setDS]=useState(-1);
const t=useRef(null);
const reset=()=>{clearInterval(t.current);setPh("idle");setPP(0);setDT([]);setKv(0);setDS(-1);};
const start=()=>{reset();setPh("pf");let p=0;t.current=setInterval(()=>{p++;setPP(p);if(p>=P_TOKENS.length){clearInterval(t.current);setKv(P_TOKENS.length);setTimeout(()=>{setPh("dc");let d=0;t.current=setInterval(()=>{if(d>=O_TOKENS.length){clearInterval(t.current);setPh("done");return;}setDT(pr=>[...pr,O_TOKENS[d]]);setKv(P_TOKENS.length+d+1);setDS(d);d++;},350);},500);}},80);};
useEffect(()=>()=>clearInterval(t.current),[]);

return <div>
<Card color={C.orange}>
<div style={{fontSize:12,fontWeight:600,color:C.orange,marginBottom:4}}>实例："{PROMPT}"</div>
<div style={{fontSize:11,color:"#bbb"}}>点击播放，观察 Prefill 填充 KV Cache → Decode 逐 token 生成</div>
</Card>
<div style={{display:"flex",gap:8,marginBottom:14}}>
<button onClick={start} disabled={ph==="pf"||ph==="dc"} style={{padding:"8px 18px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",border:"1.5px solid "+C.orange,background:C.orange+"15",color:C.orange,opacity:ph==="pf"||ph==="dc"?0.5:1}}>▶ 播放</button>
<button onClick={reset} style={{padding:"8px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:"1.5px solid #444",background:"rgba(255,255,255,0.03)",color:"#888"}}>重置</button>
{ph!=="idle"&&<Tag c={ph==="pf"?C.blue:ph==="dc"?C.orange:C.green}>{ph==="pf"?"⚡ PREFILL":(ph==="dc"?"🔄 DECODE":"✅ 完成")}</Tag>}
</div>
<Card><Label>Prompt tokens</Label><div>{P_TOKENS.map((tk,i)=><Chip key={i} t={tk} idx={i} hl={pp>i} c={C.blue}/>)}</div></Card>
{ph!=="idle"&&<Card color={C.orange}>
<div style={{display:"flex",justifyContent:"space-between"}}><Label>KV Cache</Label><span style={{fontSize:10,color:C.orange,...M}}>{kv} slots</span></div>
<div style={{height:16,background:"rgba(255,255,255,0.04)",borderRadius:6,overflow:"hidden",marginTop:4}}>
<div style={{height:"100%",borderRadius:6,background:"linear-gradient(90deg,"+C.blue+","+C.orange+")",width:String(kv/(P_TOKENS.length+O_TOKENS.length)*100)+"%",transition:"width 0.3s"}}/>
</div>
</Card>}
{(ph==="dc"||ph==="done")&&<Card color={C.green}>
<Label>输出</Label>
<div style={{minHeight:30}}>
{dt.map((tk,i)=><Chip key={i} t={tk} hl={true} c={C.green}/>)}
{ph==="dc"&&<span style={{display:"inline-block",width:8,height:14,background:C.orange,borderRadius:2,verticalAlign:"middle",marginLeft:2,animation:"blink 0.8s step-end infinite"}}/>}
</div>
{(ph==="dc"&&ds>=0)&&<div style={{fontSize:10,color:"#888",marginTop:6,padding:"6px 8px",background:C.orange+"08",borderRadius:6}}>{"第"+(ds+1)+"步：Q×KV["+(kv-1)+"条] → \""+O_TOKENS[ds]+"\" → Cache="+kv+"条"}</div>}
</Card>}

  </div>;

// ─── "WHAT IF" SANDBOX (memory & cost calculator) ──────────────────
function Sandbox() {
  const [params, setParams] = useState(70);     // billions
  const [ctx, setCtx] = useState(8192);         // tokens
  const [batch, setBatch] = useState(1);
  const [prec, setPrec] = useState("FP16");
  const [att, setAtt] = useState("GQA");        // MHA / GQA / MQA

  const PREC = {"FP16": 2, "FP8": 1, "INT8": 1, "INT4": 0.5};
  const KV_RATIO = {"MHA": 1.0, "GQA": 0.25, "MQA": 0.125};
  const HARDWARE = [
    {n:"RTX 4090",      vram:24,  fp16_t:165,  hr:0.45,  c:C.green},
    {n:"A100 80GB",     vram:80,  fp16_t:312,  hr:1.80,  c:C.cyan},
    {n:"H100 80GB",     vram:80,  fp16_t:989,  hr:2.99,  c:C.purple},
    {n:"H200 141GB",    vram:141, fp16_t:989,  hr:4.50,  c:C.orange},
  ];

  const bytesPerWeight = PREC[prec];
  const weightsGB = params * bytesPerWeight;

  // KV cache size: rough — assume 80 layers, head_dim=128, 8 KV heads (GQA), FP16
  // = 2 (K and V) × layers × kv_heads × head_dim × ctx × batch × bytes
  // Use proxy: kv_per_token_KB scales with model size
  const baseKvPerToken_KB = 0.5 * Math.pow(params, 0.55);   // ~0.5 KB at 1B, ~5 KB at 70B
  const kvPerToken_KB = baseKvPerToken_KB * KV_RATIO[att] * (PREC[prec] / 2);
  const kvGB = (kvPerToken_KB * ctx * batch) / 1024 / 1024;

  // Activations: ~ctx * d * batch * 4 bytes for FP16 ish
  // Approximation
  const actGB = ctx * batch * Math.sqrt(params) * 0.0005;

  const totalGB = weightsGB + kvGB + actGB;

  const hwResults = HARDWARE.map(h => {
    const gpus = Math.ceil(totalGB / (h.vram * 0.85));   // 85% usable
    const cost_hr = gpus * h.hr;
    // Roughly: speed ~ FLOPs / params / batch
    const tps = batch * h.fp16_t * 1000 / (params * 2);   // very rough
    return {...h, gpus, cost_hr, tps};
  });

  const verdict = (g) => {
    if (g === 1) return {label:"单卡可跑", c:C.green};
    if (g <= 4) return {label:"单机多卡", c:C.cyan};
    if (g <= 8) return {label:"满载单机", c:C.orange};
    return {label:`需 ${g} 卡集群`, c:C.red};
  };

  const Slider = ({label, val, options, on, c, format}) => (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
        <span style={{color:"#aaa"}}>{label}</span>
        <span style={{color:c,fontWeight:700,...M}}>{format ? format(val) : val}</span>
      </div>
      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        {options.map(o => <button key={o} onClick={()=>on(o)}
          style={{flex:1,minWidth:50,padding:"4px 6px",borderRadius:4,fontSize:9,fontWeight:700,cursor:"pointer",border:"1px solid "+(val===o?c+"66":"rgba(255,255,255,0.08)"),background:val===o?c+"22":"transparent",color:val===o?c:"#888",transition:"all 0.2s",...M}}>
          {format ? format(o) : o}
        </button>)}
      </div>
    </div>
  );

  return <Card color={C.orange}>
    <div style={{fontSize:11,color:"#aaa",marginBottom:14,lineHeight:1.7}}>
      把所有旋钮拨到你的真实场景，看看 <Acc c={C.cyan}>显存够不够</Acc>、<Acc c={C.green}>需要几张卡</Acc>、<Acc c={C.orange}>每小时烧多少钱</Acc>。
    </div>

    {/* Controls */}
    <div style={{padding:"12px 14px",background:"rgba(0,0,0,0.3)",borderRadius:8,marginBottom:14}}>
      <Slider label="模型规模 (B params)" val={params} options={[1,7,13,30,70,175,405]} on={setParams} c={C.cyan} format={v=>v+"B"}/>
      <Slider label="上下文长度 (token)"   val={ctx}    options={[1024,4096,8192,32768,131072,1048576]} on={setCtx} c={C.purple} format={v=>v>=1048576?"1M":v>=1024?(v/1024)+"k":v}/>
      <Slider label="batch size"           val={batch}  options={[1,4,16,32,128]} on={setBatch} c={C.orange}/>
      <Slider label="权重精度"              val={prec}   options={["FP16","FP8","INT8","INT4"]} on={setPrec} c={C.green}/>
      <Slider label="Attention 变体"       val={att}    options={["MHA","GQA","MQA"]} on={setAtt} c={C.pink}/>
    </div>

    {/* Memory breakdown */}
    <Label>显存分解</Label>
    <div style={{padding:"12px 14px",background:"rgba(0,0,0,0.3)",borderRadius:8,marginBottom:12}}>
      {[
        {label:"权重",   v:weightsGB, c:C.cyan},
        {label:"KV Cache", v:kvGB,    c:C.orange},
        {label:"激活值", v:actGB,     c:C.green},
      ].map((row, i) => {
        const pct = totalGB > 0 ? (row.v / totalGB) * 100 : 0;
        return <div key={i} style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}>
            <span style={{color:"#aaa"}}>{row.label}</span>

          <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:row.c,borderRadius:3,transition:"width 0.3s"}}/>
          </div>

      })}
      <div style={{paddingTop:8,marginTop:6,borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-between"}}>
        <span style={{fontSize:11,color:"#bbb",fontWeight:700}}>合计</span>
        <span style={{fontSize:14,color:totalGB>200?C.red:C.green,fontWeight:700,...M}}>{totalGB.toFixed(1)} GB</span>
      </div>
    </div>

    {/* Hardware comparison */}
    <Label>硬件配置 × 估算</Label>
    <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.3)",borderRadius:8,marginBottom:12}}>
      <table style={{width:"100%",fontSize:10,...M,borderCollapse:"collapse"}}>
        <thead><tr style={{color:"#666",fontSize:9}}>
          <th style={{textAlign:"left",padding:"4px 6px"}}>GPU</th>
          <th style={{textAlign:"right",padding:"4px 6px"}}>需要</th>
          <th style={{textAlign:"left",padding:"4px 6px"}}>判断</th>
          <th style={{textAlign:"right",padding:"4px 6px"}}>cost/h</th>
          <th style={{textAlign:"right",padding:"4px 6px"}}>≈ tok/s</th>
        </tr></thead>
        <tbody>
          {hwResults.map((h, i) => {
            const v = verdict(h.gpus);
            return <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <td style={{padding:"5px 6px",color:h.c,fontWeight:600}}>{h.n}</td>
              <td style={{padding:"5px 6px",textAlign:"right",color:"#ddd",fontWeight:600}}>{h.gpus} 张</td>
              <td style={{padding:"5px 6px",color:v.c,fontWeight:600}}>{v.label}</td>
              <td style={{padding:"5px 6px",textAlign:"right",color:C.orange,fontWeight:600}}>${h.cost_hr.toFixed(2)}</td>
              <td style={{padding:"5px 6px",textAlign:"right",color:"#aaa"}}>{h.tps.toFixed(0)}</td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>

    <div style={{fontSize:10,color:"#999",lineHeight:1.7,padding:"10px 12px",background:"rgba(255,255,255,0.025)",borderRadius:6,border:"1px dashed rgba(255,255,255,0.06)"}}>

// ─── RoPE 2D ROTATION (position embedding) ─────────────────────────
function RoPE() {
  const [posQ, setPosQ] = useState(2);
  const [posK, setPosK] = useState(0);
  const [dim, setDim] = useState(0);   // which 2D pair (0..3)

  // Base vectors (un-rotated query and key in a single 2D pair)
  const Q0 = {x: 0.85, y: 0.35};
  const K0 = {x: 0.70, y: 0.55};

  // Per-dimension frequency θ_i = base^(-2i/d), with base = 10000
  const D = 8;  // tiny demo head-dim
  const baseFreq = 10000;
  const thetas = [0,1,2,3].map(i => Math.pow(baseFreq, -2*i / D));

  const theta = thetas[dim];
  const angleQ = posQ * theta;
  const angleK = posK * theta;

  const rotate = (v, ang) => ({x: v.x*Math.cos(ang) - v.y*Math.sin(ang), y: v.x*Math.sin(ang) + v.y*Math.cos(ang)});

  const Q = rotate(Q0, angleQ);
  const K = rotate(K0, angleK);
  const dot = Q.x*K.x + Q.y*K.y;
  const dotBase = Q0.x*K0.x + Q0.y*K0.y;
  // Relative angle Q to K
  const relAngle = (posQ - posK) * theta;

  // SVG: 200×200 canvas centered at (100, 100), unit = 80 px
  const cx = 100, cy = 100, U = 70;
  const toSvg = v => ({x: cx + v.x*U, y: cy - v.y*U});
  const Qs = toSvg(Q), Ks = toSvg(K);
  const Q0s = toSvg(Q0), K0s = toSvg(K0);

  return <Card color={C.cyan}>
    <div style={{fontSize:11,color:"#aaa",marginBottom:12,lineHeight:1.7}}>
      RoPE 不"加"位置向量，而是把 Q/K 的每对维度<Acc c={C.orange}>旋转一个角度 m·θ</Acc>（m 是位置）。
      <br/>结果：<Acc c={C.green}>Q·K 只依赖相对位置</Acc>，外推到更长上下文几乎免费。
    </div>

    {/* Visualization */}
    <div style={{display:"grid",gridTemplateColumns:"180px 1fr",gap:14,marginBottom:14,alignItems:"start"}}>
      <div style={{padding:"10px",background:"rgba(0,0,0,0.3)",borderRadius:8}}>
        <svg viewBox="0 0 200 200" style={{width:"100%",height:"auto"}}>
          {/* Axes */}
          <line x1="10" y1="100" x2="190" y2="100" stroke="rgba(255,255,255,0.1)" strokeWidth="0.5"/>
          <line x1="100" y1="10" x2="100" y2="190" stroke="rgba(255,255,255,0.1)" strokeWidth="0.5"/>
          <circle cx={cx} cy={cy} r={U} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="0.5" strokeDasharray="2,3"/>
          {/* Original Q (faded) */}
          <line x1={cx} y1={cy} x2={Q0s.x} y2={Q0s.y} stroke={C.blue} strokeWidth="1" opacity="0.25" strokeDasharray="3,3"/>
          <circle cx={Q0s.x} cy={Q0s.y} r="2" fill={C.blue} opacity="0.25"/>
          {/* Rotated Q */}
          <line x1={cx} y1={cy} x2={Qs.x} y2={Qs.y} stroke={C.blue} strokeWidth="2.2"/>
          <circle cx={Qs.x} cy={Qs.y} r="3.5" fill={C.blue}>
            <animate attributeName="r" values="3;4;3" dur="1.4s" repeatCount="indefinite"/>
          </circle>
          <text x={Qs.x+5} y={Qs.y-5} fill={C.blue} fontSize="9" fontWeight="700">Q (m={posQ})</text>
          {/* Original K (faded) */}
          <line x1={cx} y1={cy} x2={K0s.x} y2={K0s.y} stroke={C.orange} strokeWidth="1" opacity="0.25" strokeDasharray="3,3"/>
          <circle cx={K0s.x} cy={K0s.y} r="2" fill={C.orange} opacity="0.25"/>
          {/* Rotated K */}
          <line x1={cx} y1={cy} x2={Ks.x} y2={Ks.y} stroke={C.orange} strokeWidth="2.2"/>
          <circle cx={Ks.x} cy={Ks.y} r="3.5" fill={C.orange}>
            <animate attributeName="r" values="3;4;3" dur="1.4s" repeatCount="indefinite"/>
          </circle>
          <text x={Ks.x+5} y={Ks.y-5} fill={C.orange} fontSize="9" fontWeight="700">K (m={posK})</text>
          {/* Origin */}
          <circle cx={cx} cy={cy} r="1.5" fill="#fff"/>
        </svg>
        <div style={{fontSize:8,color:"#666",textAlign:"center",marginTop:4,lineHeight:1.6}}>
          虚线 = 原始 Q/K<br/>实线 = 旋转后<br/>θ_dim={theta.toFixed(4)}
        </div>
      </div>

      <div>
        <Label>位置 m_Q（query）</Label>
        <input type="range" min="0" max="64" value={posQ} onChange={e=>setPosQ(parseInt(e.target.value))}
          style={{width:"100%",accentColor:C.blue,marginBottom:4}}/>
        <div style={{fontSize:10,color:C.blue,...M,marginBottom:10}}>m_Q = {posQ} → 旋转 {(angleQ * 180 / Math.PI).toFixed(1)}°</div>

        <Label>位置 m_K（key）</Label>
        <input type="range" min="0" max="64" value={posK} onChange={e=>setPosK(parseInt(e.target.value))}
          style={{width:"100%",accentColor:C.orange,marginBottom:4}}/>
        <div style={{fontSize:10,color:C.orange,...M,marginBottom:10}}>m_K = {posK} → 旋转 {(angleK * 180 / Math.PI).toFixed(1)}°</div>

        <Label>当前看哪一对维度（共 {D/2} 对）</Label>
        <div style={{display:"flex",gap:4,marginBottom:8}}>
          {[0,1,2,3].map(i => <button key={i} onClick={()=>setDim(i)} style={{flex:1,padding:"4px 6px",borderRadius:4,fontSize:9,fontWeight:700,cursor:"pointer",border:"1px solid "+(dim===i?C.cyan+"66":"rgba(255,255,255,0.1)"),background:dim===i?C.cyan+"22":"transparent",color:dim===i?C.cyan:"#888",...M}}>dim {2*i},{2*i+1}</button>)}
        </div>
        <div style={{fontSize:9,color:"#666",lineHeight:1.6}}>
          低维（dim 0,1）频率高，每步转大角度。<br/>
          高维（dim 6,7）频率极低，几乎不转 → 编码长程信息。
        </div>
      </div>
    </div>

    {/* Stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:10}}>
      <div style={{padding:"10px 12px",background:C.green+"10",border:"1px solid "+C.green+"33",borderRadius:6}}>
        <div style={{fontSize:9,color:"#888"}}>当前 Q · K</div>
        <div style={{fontSize:16,fontWeight:700,color:C.green,...M}}>{dot.toFixed(4)}</div>
      </div>
      <div style={{padding:"10px 12px",background:C.purple+"10",border:"1px solid "+C.purple+"33",borderRadius:6}}>
        <div style={{fontSize:9,color:"#888"}}>相对位置 Δm = m_Q − m_K</div>
        <div style={{fontSize:16,fontWeight:700,color:C.purple,...M}}>{posQ - posK} （旋转 {(relAngle*180/Math.PI).toFixed(1)}°）</div>
      </div>
    </div>

    <div style={{padding:"10px 12px",background:"rgba(255,255,255,0.025)",border:"1px dashed rgba(255,255,255,0.06)",borderRadius:6,marginBottom:10}}>
      <div style={{fontSize:10,color:"#bbb",fontWeight:600,marginBottom:4}}>🧩 关键性质</div>
      <div style={{fontSize:10,color:"#999",lineHeight:1.7}}>
        把 m_Q 和 m_K 同时增加 <span style={{...M,color:C.cyan}}>K</span>，Q·K 不变（对应代码：滑动 Q 和 K 同方向，dot 几乎不变）。
        <br/>原始未旋转的 Q·K = <span style={{color:C.cyan,...M}}>{dotBase.toFixed(4)}</span>
      </div>
    </div>

    <div style={{fontSize:10,color:"#999",lineHeight:1.7,padding:"10px 12px",background:"rgba(255,255,255,0.025)",borderRadius:6,border:"1px dashed rgba(255,255,255,0.06)"}}>
      <div style={{color:"#bbb",fontWeight:600,marginBottom:4}}>📌 实战</div>
      • <Acc c={C.cyan}>Llama / Mistral / Qwen / DeepSeek</Acc> 全用 RoPE。<br/>
      • 想要长上下文？<Acc c={C.orange}>NTK-aware scaling</Acc> / <Acc c={C.orange}>YaRN</Acc> 调高低维频率即可，无需重训。<br/>
      • RoPE 把"绝对位置"和"相对位置"统一：<Acc c={C.green}>编码绝对、点积上看到相对</Acc>。<br/>
      • 公式：旋转矩阵 R<sub>m·θ</sub> 作用在 Q、K 的每对维度上，θ_i = 10000<sup>-2i/d</sup>。
    </div>
  </Card>;
}

      loss:"L = −Σ log P(x_t | x_<t)",

// ─── MIXTURE OF EXPERTS (router + expert routing) ──────────────────
function MoE() {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(true);
  const tref = useRef(null);

  const TOKENS = ["写", "一段", "Python", "代码", "求", "斐波那契"];
  const N_EXPERTS = 8;
  const TOP_K = 2;

  // Pretend each expert specializes in something
  const EXPERT_LABELS = ["语法", "中文", "代码", "数学", "常识", "推理", "对话", "编辑"];
  // For each token, pretend the router gives these scores (length 8)
  const ROUTER_SCORES = [
    [0.65, 0.78, 0.20, 0.10, 0.30, 0.40, 0.50, 0.55],   // "写" → 语法 + 中文
    [0.55, 0.82, 0.15, 0.08, 0.25, 0.40, 0.40, 0.50],   // "一段" → 语法 + 中文
    [0.30, 0.20, 0.95, 0.40, 0.20, 0.50, 0.20, 0.40],   // "Python" → 代码 + 推理
    [0.40, 0.40, 0.92, 0.50, 0.30, 0.55, 0.30, 0.45],   // "代码" → 代码 + 推理
    [0.30, 0.40, 0.50, 0.85, 0.30, 0.70, 0.20, 0.40],   // "求" → 数学 + 推理
    [0.20, 0.45, 0.65, 0.92, 0.30, 0.85, 0.20, 0.40],   // "斐波那契" → 数学 + 代码
  ];

  // Find top-K experts for current token
  const ranked = ROUTER_SCORES[step].map((s, i) => ({s, i})).sort((a, b) => b.s - a.s);
  const chosen = new Set(ranked.slice(0, TOP_K).map(x => x.i));

  // Stats
  const expertParams_B = 1.6;  // each expert
  const totalParams_B = N_EXPERTS * expertParams_B;
  const activeParams_B = TOP_K * expertParams_B;

  useEffect(() => {
    if (!playing) return;
    tref.current = setInterval(() => setStep(s => (s + 1) % TOKENS.length), 1300);
    return () => clearInterval(tref.current);
  }, [playing, TOKENS.length]);

  return <Card color={C.purple}>
    <div style={{fontSize:11,color:"#aaa",marginBottom:12,lineHeight:1.7}}>

      <br/>同样 FLOPs 下，<Acc c={C.green}>总参数量数倍于 dense</Acc>，模型更聪明，推理依旧便宜。

        background: i === step ? C.purple+"55" : (i < step ? "rgba(255,255,255,0.04)" : "transparent"),
        color: i === step ? "#fff" : (i < step ? "#bbb" : "#555"),
        border: i === step ? `1.5px solid ${C.purple}` : "1.5px solid transparent",
        transition:"all 0.3s",fontWeight:i===step?700:400,
      }}>{t}</span>)}
    </div>

    {/* Router output */}
    <Label>Router 打分（softmax over 8 experts）</Label>
    <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.25)",borderRadius:8,marginBottom:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:6}}>
        {EXPERT_LABELS.map((label, i) => {
          const s = ROUTER_SCORES[step][i];

          return <div key={i} style={{textAlign:"center"}}>

            <div style={{fontSize:9,color:isChosen?C.green:"#666",marginTop:2,fontWeight:isChosen?700:400}}>E{i}</div>
            <div style={{fontSize:8,color:"#555"}}>{label}</div>
          </div>;

      </div>

    {/* Routing illustration */}

    <div style={{padding:"14px 12px",background:"rgba(0,0,0,0.3)",borderRadius:8,marginBottom:12,position:"relative"}}>

        <div style={{fontSize:16,fontWeight:700,color:C.cyan,...M}}>{(TOP_K / N_EXPERTS * 100).toFixed(0)}%</div>
      </div>
    </div>

    <div style={{display:"flex",gap:6,marginBottom:10}}>
      <button onClick={()=>setPlaying(!playing)} style={{flex:1,padding:"6px 10px",borderRadius:5,fontSize:10,fontWeight:600,cursor:"pointer",border:"1px solid "+C.purple+"55",background:C.purple+"15",color:C.purple}}>{playing ? "⏸ 暂停" : "▶ 播放"}</button>

      <div style={{color:"#bbb",fontWeight:600,marginBottom:4}}>📌 实际模型</div>

// ─── SPECULATIVE DECODING (draft + target) ─────────────────────────
function SpecDecode() {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(true);
  const tref = useRef(null);

  // Each round: draft proposes K tokens, target accepts a prefix of them.
  const ROUNDS = [
    {draft:["the","cat","sat","on"],   accept:4, comment:"全部命中：4 token / 1 pass"},
    {draft:["the","mat","it","was"],   accept:2, comment:"前 2 命中，后 2 被驳回"},
    {draft:["a","big","fluffy","dog"], accept:1, comment:"语义偏移：仅首 token 命中"},
    {draft:["tired","and","hungry","."], accept:4, comment:"再次全部命中"},
  ];

  // Build a flat timeline of micro-frames so we can animate
  // Each round has phases: draft1, draft2, draft3, draft4, verify, settle
  const FRAMES_PER_ROUND = 7;
  const TOTAL = ROUNDS.length * FRAMES_PER_ROUND;

  useEffect(() => {
    if (!playing) return;
    tref.current = setInterval(() => setStep(s => (s + 1) % TOTAL), 450);
    return () => clearInterval(tref.current);
  }, [playing, TOTAL]);

  const round = Math.floor(step / FRAMES_PER_ROUND);
  const phase = step % FRAMES_PER_ROUND;
  const cur = ROUNDS[round];

  // Stats accumulated across completed rounds + partial current
  let acceptedTotal = 0, passesTotal = 0;
  for (let r = 0; r < round; r++) { acceptedTotal += ROUNDS[r].accept; passesTotal += 1; }
  if (phase >= 5) { acceptedTotal += cur.accept; passesTotal += 1; }
  // Compare: baseline would have used 1 big pass per token
  const baselinePasses = acceptedTotal;
  const speedup = passesTotal > 0 ? (baselinePasses / passesTotal) : 0;

  // What's currently lit?
  const draftRevealed = Math.min(cur.draft.length, phase);   // 0..4 tokens drafted

// ─── CONTINUOUS BATCHING ANIMATION ─────────────────────────────────
function ContBatch() {
  const [mode, setMode] = useState("cont");
  const [t, setT] = useState(0);
  const [playing, setPlaying] = useState(true);
  const tref = useRef(null);

  // Each request: { id, color, prefill (1 cell), decode (N cells) }
  // Static schedule has fixed slot occupancy; continuous fills gaps.
  const REQS = [
    {id:"R1", c:C.cyan,   prefill:1, decode:4,  arrive:0},
    {id:"R2", c:C.green,  prefill:1, decode:7,  arrive:0},
    {id:"R3", c:C.orange, prefill:1, decode:11, arrive:0},
    {id:"R4", c:C.purple, prefill:1, decode:5,  arrive:0},
    {id:"R5", c:C.pink,   prefill:1, decode:6,  arrive:5},   // arrives mid-flight
    {id:"R6", c:C.yellow, prefill:1, decode:4,  arrive:8},
    {id:"R7", c:C.red,    prefill:1, decode:3,  arrive:10},
    {id:"R8", c:C.blue,   prefill:1, decode:5,  arrive:13},
  ];
  const SLOTS = 4;
  const TICKS = 22;

  // Build schedule: slots[slot][t] = req object (or null)
  const schedule = Array.from({length: SLOTS}, () => Array(TICKS).fill(null));
  if (mode === "static") {
    // Naive batched: launch in groups of SLOTS, batch ends when slowest in group finishes
    let cursor = 0;
    let i = 0;
    while (i < REQS.length && cursor < TICKS) {
      const group = REQS.slice(i, i + SLOTS).filter(r => r.arrive <= cursor + 2);
      if (group.length === 0) { cursor++; continue; }
      const groupLen = Math.max(...group.map(r => r.prefill + r.decode));
      group.forEach((r, gIdx) => {
        for (let dt = 0; dt < r.prefill + r.decode && cursor + dt < TICKS; dt++) {
          schedule[gIdx][cursor + dt] = r;
        }
      });
      cursor += groupLen;
      i += group.length;
    }
  } else {
    // Continuous: greedily slot any arrived-but-not-yet-running request into a free slot each tick
    const remaining = REQS.map(r => ({...r, left: r.prefill + r.decode, started: false}));
    for (let tick = 0; tick < TICKS; tick++) {
      // First, continue any in-progress (one per slot)
      // For continuous batching, slot occupancy is stable while request continues
      for (let s = 0; s < SLOTS; s++) {
        const cur = tick > 0 ? schedule[s][tick - 1] : null;
        if (cur) {
          const r = remaining.find(x => x.id === cur.id);
          if (r && r.left > 0) { schedule[s][tick] = cur; r.left--; }
        }
      }
      // Then, fill empty slots with newly-arrived requests
      for (let s = 0; s < SLOTS; s++) {
        if (schedule[s][tick]) continue;
        const next = remaining.find(r => !r.started && r.arrive <= tick && r.left > 0);
        if (next) {
          schedule[s][tick] = next;
          next.started = true;
          next.left--;
        }
      }
    }
  }

  // Compute GPU utilization (% slots in use) at current t
  const occupied = (tick) => {
    let n = 0;
    for (let s = 0; s < SLOTS; s++) if (schedule[s][tick]) n++;
    return n;
  };
  const utilNow = occupied(t);

  useEffect(() => {
    if (!playing) return;
    tref.current = setInterval(() => setT(prev => (prev + 1) % TICKS), 350);
    return () => clearInterval(tref.current);
  }, [playing]);

  const totalUtil = Array.from({length: TICKS}, (_, i) => occupied(i)).reduce((a,b) => a+b, 0);
  const utilPct = (totalUtil / (SLOTS * TICKS) * 100).toFixed(0);

  return <Card color={C.purple}>
    <div style={{fontSize:11,color:"#aaa",marginBottom:12,lineHeight:1.7}}>
      多个请求长度不同，怎么共享 4 个 GPU 槽位？
      <br/>切换模式看 <Acc c={C.green}>vLLM 引入的核心创新</Acc>。
    </div>

    <div style={{display:"flex",gap:6,marginBottom:12}}>
      {[["static","🪨 静态批处理"],["cont","⚡ 连续批处理"]].map(([k,v]) =>
        <button key={k} onClick={()=>{setMode(k); setT(0);}} style={{flex:1,padding:"6px 10px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",border:"1.5px solid "+(mode===k?C.purple+"99":"rgba(255,255,255,0.1)"),background:mode===k?C.purple+"22":"transparent",color:mode===k?C.purple:"#888"}}>{v}</button>
      )}
    </div>

    {/* Schedule grid */}
    <div style={{padding:"12px 12px",background:"rgba(0,0,0,0.3)",borderRadius:8,marginBottom:12,overflowX:"auto"}}>
      {/* time axis */}
      <div style={{display:"flex",gap:1,marginBottom:6,marginLeft:36}}>
        {Array.from({length: TICKS}, (_, i) => <div key={i} style={{width:18,textAlign:"center",fontSize:7,color:i===t?C.orange:"#444",fontWeight:i===t?700:400,...M}}>{i}</div>)}
      </div>
      {/* slot rows */}
      {Array.from({length: SLOTS}, (_, s) => <div key={s} style={{display:"flex",gap:1,alignItems:"center",marginBottom:2}}>
        <div style={{width:34,fontSize:9,color:"#888",textAlign:"right",paddingRight:4,...M}}>slot {s}</div>
        {schedule[s].map((req, i) => {
          const isNow = i === t;
          const c = req ? req.c : null;
          return <div key={i} title={req ? req.id : "idle"} style={{
            width: 18, height: 22, borderRadius: 3,
            background: req ? c + (isNow ? "DD" : "55") : (isNow ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.02)"),
            border: isNow ? "1px solid " + C.orange : "1px solid transparent",
            transition: "all 0.15s",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:7,color:"#fff",fontWeight:600,...M,
            boxShadow: req && isNow ? `0 0 6px ${c}88` : "none",
          }}>{req ? req.id.slice(1) : ""}</div>;
        })}
      </div>)}
      {/* utilization timeline */}
      <div style={{display:"flex",gap:1,alignItems:"flex-end",marginTop:8,marginLeft:36,height:24}}>
        {Array.from({length: TICKS}, (_, i) => {
          const u = occupied(i) / SLOTS;
          return <div key={i} style={{width:18,height:Math.max(2, u * 22),background:u >= 0.95 ? C.green : u >= 0.5 ? C.orange : C.red,opacity:0.8,borderRadius:1,transition:"all 0.2s"}}/>;
        })}
      </div>
      <div style={{marginLeft:36,fontSize:8,color:"#666",marginTop:2}}>↑ GPU 利用率（满 = 4/4 槽位）</div>
    </div>

    <div style={{display:"flex",gap:6,marginBottom:10}}>
      <button onClick={()=>setPlaying(!playing)} style={{flex:1,padding:"6px 10px",borderRadius:5,fontSize:10,fontWeight:600,cursor:"pointer",border:"1px solid "+C.cyan+"55",background:C.cyan+"15",color:C.cyan}}>{playing ? "⏸ 暂停" : "▶ 播放"}</button>
      <button onClick={()=>{setT(0);}} style={{padding:"6px 12px",borderRadius:5,fontSize:10,fontWeight:600,cursor:"pointer",border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"#888"}}>↺ 重置</button>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:10}}>
      <div style={{padding:"10px 12px",background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6}}>
        <div style={{fontSize:9,color:"#888"}}>当前 t={t} 槽位利用</div>
        <div style={{fontSize:18,fontWeight:700,color:utilNow === SLOTS ? C.green : C.orange,...M}}>{utilNow}/{SLOTS}</div>
      </div>
      <div style={{padding:"10px 12px",background:mode==="cont"?C.green+"10":C.red+"10",border:"1px solid "+(mode==="cont"?C.green+"33":C.red+"33"),borderRadius:6}}>
        <div style={{fontSize:9,color:"#888"}}>整段 GPU 利用率</div>
        <div style={{fontSize:18,fontWeight:700,color:mode==="cont"?C.green:C.red,...M}}>{utilPct}%</div>
      </div>
    </div>

    <div style={{fontSize:10,color:"#999",lineHeight:1.7,padding:"10px 12px",background:"rgba(255,255,255,0.025)",borderRadius:6,border:"1px dashed rgba(255,255,255,0.06)"}}>
      <div style={{color:"#bbb",fontWeight:600,marginBottom:4}}>📌 关键点</div>
      • <Acc c={C.red}>静态批</Acc>：4 个请求一起开始、一起结束。最长的请求拖累全组 → <Acc c={C.red}>大量空闲槽位</Acc>。<br/>
      • <Acc c={C.green}>连续批</Acc>：一旦有请求结束，立刻把新请求的 prefill 塞进空槽 → <Acc c={C.green}>槽位几乎不空</Acc>，吞吐 2-4×。<br/>
      • 实现关键：<Acc c={C.cyan}>iteration-level scheduling</Acc> + <Acc c={C.cyan}>PagedAttention</Acc>（KV Cache 分页）。<br/>
      • 是 vLLM / TensorRT-LLM / SGLang 的核心 trick。
    </div>
  </Card>;
}

// ─── QUANTIZATION COMPARISON (FP16 / FP8 / INT8 / INT4) ────────────
function Quant() {
  const [prec, setPrec] = useState("INT8");

  // 4×4 toy weight matrix (FP16 ground truth)
  const W = [
    [ 0.4218, -0.1352,  0.8541, -0.2733],
    [-0.6128,  0.0421,  0.3187, -0.7892],
    [ 0.5443, -0.4912,  0.1024,  0.6739],
    [-0.0857,  0.7621, -0.5346,  0.2418],
  ];
  const flat = W.flat();
  const absMax = Math.max(...flat.map(Math.abs));

  const FORMATS = {
    "FP16":  {bytes: 2,    color: C.cyan,   bits: "1 + 5 + 10",  desc: "IEEE 754 半精度",  qFn: (x) => x},
    "FP8":   {bytes: 1,    color: C.green,  bits: "1 + 4 + 3",   desc: "E4M3，H100 原生",  qFn: (x) => {
      // simulate FP8 E4M3 — quantize to ~256 levels in [-448, +448], here normalized
      const scale = 8 / absMax;       // exaggerated to show error visually
      return Math.round(x * scale) / scale;
    }},
    "INT8":  {bytes: 1,    color: C.orange, bits: "(对称量化)",  desc: "GPTQ / AWQ 主流", qFn: (x) => {
      const s = absMax / 127;
      const q = Math.round(x / s);
      return q * s;
    }},
    "INT4":  {bytes: 0.5,  color: C.red,    bits: "(对称量化)",  desc: "极端压缩，移动端",   qFn: (x) => {
      const s = absMax / 7;
      const q = Math.round(x / s);
      return q * s;
    }},
  };

  const f = FORMATS[prec];
  const Wq = W.map(row => row.map(f.qFn));
  const errors = W.map((row, i) => row.map((x, j) => Math.abs(x - Wq[i][j])));
  const meanErr = errors.flat().reduce((a, b) => a + b, 0) / 16;
  const maxErr = Math.max(...errors.flat());
  const compression = 2 / f.bytes;
  const params70B_GB = 70 * f.bytes;

  // pretend perplexity overhead by precision
  const PPL = {"FP16": 0.0, "FP8": 0.05, "INT8": 0.10, "INT4": 0.65};

  const fmt = (x) => (x >= 0 ? "+" : "") + x.toFixed(prec === "FP16" ? 4 : prec === "FP8" ? 3 : 3);

  return <Card color={C.green}>
    <div style={{fontSize:11,color:"#aaa",marginBottom:12,lineHeight:1.7}}>
      把 16-bit 浮点权重压成 8-bit 甚至 4-bit。
      显存砍半甚至 1/4，<Acc c={C.red}>但每个权重都引入舍入误差</Acc>。
      看右边的色斑就是误差地图。
    </div>

    {/* Precision selector */}
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
      {Object.keys(FORMATS).map(k => <button key={k} onClick={()=>setPrec(k)}
        style={{flex:1,minWidth:64,padding:"7px 8px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",border:"1.5px solid "+(prec===k?FORMATS[k].color+"99":"rgba(255,255,255,0.08)"),background:prec===k?FORMATS[k].color+"22":"transparent",color:prec===k?FORMATS[k].color:"#888",transition:"all 0.2s"}}>{k}</button>)}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      {/* Original */}
      <div>
        <Label>FP16 原始权重</Label>
        <div style={{padding:"8px",background:"rgba(0,0,0,0.3)",borderRadius:6}}>
          <table style={{width:"100%",fontSize:9,...M,borderCollapse:"collapse"}}>
            <tbody>{W.map((row, i) => <tr key={i}>
              {row.map((x, j) => <td key={j} style={{padding:"4px 3px",textAlign:"center",color:x >= 0 ? C.cyan : C.pink,borderBottom:"1px solid rgba(255,255,255,0.04)"}}>{(x >= 0 ? "+" : "") + x.toFixed(4)}</td>)}
            </tr>)}</tbody>
          </table>
        </div>
      </div>
      {/* Quantized */}
      <div>
        <Label>{prec} 量化后 + 误差色斑</Label>
        <div style={{padding:"8px",background:"rgba(0,0,0,0.3)",borderRadius:6}}>
          <table style={{width:"100%",fontSize:9,...M,borderCollapse:"collapse"}}>
            <tbody>{Wq.map((row, i) => <tr key={i}>
              {row.map((x, j) => {
                const err = errors[i][j];
                const rel = maxErr > 0 ? err / maxErr : 0;
                const bg = `rgba(232,93,117,${rel * 0.45})`;
                return <td key={j} style={{padding:"4px 3px",textAlign:"center",color:x >= 0 ? f.color : C.pink,borderBottom:"1px solid rgba(255,255,255,0.04)",background:bg,transition:"all 0.25s"}}>{(x >= 0 ? "+" : "") + x.toFixed(prec === "FP16" ? 4 : 3)}</td>;
              })}
            </tr>)}</tbody>
          </table>
        </div>
      </div>
    </div>

    {/* Bit layout single weight */}
    <Label>位布局 · 单个权重 ({fmt(W[0][2])} → {fmt(Wq[0][2])})</Label>
    <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.3)",borderRadius:8,marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:9,...M,marginBottom:6}}>
        <span style={{color:"#888",width:50}}>FP16</span>
        <span style={{padding:"3px 6px",background:C.red+"33",color:C.red,borderRadius:3}}>S</span>
        <span style={{padding:"3px 6px",background:C.blue+"33",color:C.blue,borderRadius:3}}>EEEEE</span>
        <span style={{padding:"3px 6px",background:C.green+"33",color:C.green,borderRadius:3}}>MMMMMMMMMM</span>
        <span style={{color:"#666",marginLeft:"auto"}}>= 16 bits = 2 B</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:9,...M,marginBottom:6,opacity:prec==="FP8"?1:0.4}}>
        <span style={{color:"#888",width:50}}>FP8 E4M3</span>
        <span style={{padding:"3px 6px",background:C.red+"33",color:C.red,borderRadius:3}}>S</span>
        <span style={{padding:"3px 6px",background:C.blue+"33",color:C.blue,borderRadius:3}}>EEEE</span>
        <span style={{padding:"3px 6px",background:C.green+"33",color:C.green,borderRadius:3}}>MMM</span>
        <span style={{color:"#666",marginLeft:"auto"}}>= 8 bits = 1 B</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:9,...M,marginBottom:6,opacity:prec==="INT8"?1:0.4}}>
        <span style={{color:"#888",width:50}}>INT8</span>
        <span style={{padding:"3px 6px",background:C.orange+"33",color:C.orange,borderRadius:3}}>SIIIIIII</span>
        <span style={{color:"#666",marginLeft:"auto"}}>= 8 bits = 1 B　scale × q</span>

      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:9,...M,opacity:prec==="INT4"?1:0.4}}>

        <span style={{padding:"3px 6px",background:C.red+"33",color:C.red,borderRadius:3}}>SIII</span>

      </div>
    </div>

    {/* Stats */}

// ─── SAMPLING STRATEGY (temperature / top-p / top-k) ───────────────
function Sampling() {
  const [T, setT] = useState(1.0);
  const [topK, setTopK] = useState(50);
  const [topP, setTopP] = useState(0.9);

  const CONTEXT = "今天的天气真";
  const CANDIDATES = [
    {tok:"好",  logit:3.2},
    {tok:"热",  logit:2.9},
    {tok:"冷",  logit:2.5},
    {tok:"棒",  logit:2.2},
    {tok:"美",  logit:1.9},
    {tok:"差",  logit:1.6},
    {tok:"晴",  logit:1.3},
    {tok:"凉",  logit:1.0},
    {tok:"潮",  logit:0.6},
    {tok:"蓝",  logit:0.3},
  ];

  const softmax = (xs) => {
    const mx = Math.max(...xs);
    const ex = xs.map(x => Math.exp(x - mx));
    const s = ex.reduce((a,b) => a+b, 0);
    return ex.map(e => e/s);
  };

  // Step 1: temperature-scaled softmax
  const scaled = CANDIDATES.map(c => c.logit / Math.max(0.05, T));
  const baseProbs = softmax(scaled);

  // Step 2: top-k filter (sort, keep top K indices)
  const sortIdx = baseProbs.map((p,i) => ({p,i})).sort((a,b) => b.p - a.p);
  const keepK = new Set(sortIdx.slice(0, topK).map(x => x.i));

  // Step 3: top-p (nucleus) — among top-k, keep until cumulative >= topP
  const keepP = new Set();
  let cum = 0;
  for (const {p,i} of sortIdx) {
    if (!keepK.has(i)) continue;
    keepP.add(i);
    cum += p;
    if (cum >= topP) break;
  }

  // Step 4: renormalize
  const masked = baseProbs.map((p,i) => keepP.has(i) ? p : 0);
  const sM = masked.reduce((a,b) => a+b, 0) || 1;
  const finalProbs = masked.map(p => p/sM);

  const maxBase = Math.max(...baseProbs);

  // Quick semantic hint about current settings
  let mood;
  if (T <= 0.3) mood = {label:"贪心 / 确定", c:C.blue, why:"几乎只走最高概率的 token，输出可复现但单调。"};
  else if (T <= 0.8) mood = {label:"低温 / 稳健", c:C.green, why:"略保留多样性，适合代码、事实问答。"};
  else if (T <= 1.2) mood = {label:"中温 / 平衡", c:C.cyan, why:"教科书默认，对话和写作的常用区间。"};
  else if (T <= 1.7) mood = {label:"高温 / 创意", c:C.orange, why:"放大尾部，适合头脑风暴、诗歌。"};
  else mood = {label:"狂热 / 失控", c:C.red, why:"分布过平，容易产生不连贯甚至无意义的 token。"};

  const Slider = ({label, val, min, max, step, fmt, on, c}) => (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
        <span style={{color:"#aaa"}}>{label}</span>
        <span style={{color:c,fontWeight:700,...M}}>{fmt(val)}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={val}
        onChange={e=>on(parseFloat(e.target.value))}
        style={{width:"100%",accentColor:c}}/>
    </div>
  );

  const Bar = ({tok, prob, base, kept, idx}) => {
    const pct = base > 0 ? (prob/maxBase) * 100 : 0;
    const basePct = (base/maxBase) * 100;
    return <div style={{marginBottom:4,fontSize:10}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:24,textAlign:"right",color:kept?"#fff":"#555",fontWeight:600,fontSize:13,...M}}>{tok}</span>
        <div style={{flex:1,height:18,position:"relative",background:"rgba(255,255,255,0.04)",borderRadius:3,overflow:"hidden"}}>
          {/* base ghost */}
          <div style={{position:"absolute",inset:0,width:basePct+"%",background:"rgba(255,255,255,0.06)",borderRadius:3}}/>
          {/* renormalized */}
          <div style={{position:"absolute",inset:0,width:pct+"%",background:kept?`linear-gradient(90deg,${C.green},${C.cyan})`:"transparent",borderRadius:3,transition:"width 0.25s"}}/>
        </div>
        <span style={{width:60,textAlign:"right",color:kept?C.green:"#444",...M,fontSize:9}}>{(prob*100).toFixed(1)}%</span>
      </div>
    </div>;
  };

  return <Card color={C.purple}>
    <div style={{fontSize:11,color:"#aaa",marginBottom:12,lineHeight:1.7}}>
      Forward 后模型给出 logits。三个旋钮 <Acc c={C.orange}>temperature</Acc> / <Acc c={C.orange}>top-k</Acc> / <Acc c={C.orange}>top-p</Acc> 决定了从概率分布里"摇"哪个 token。
    </div>

    {/* Context */}
    <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.3)",borderRadius:6,marginBottom:12,fontSize:13,color:"#ddd",...M}}>
      "{CONTEXT}<span style={{color:C.purple,fontWeight:700,marginLeft:4}}>?</span>"
      <span style={{fontSize:9,color:"#666",marginLeft:8}}>← 模型预测下一个字</span>
    </div>

    {/* Controls */}
    <div style={{padding:"12px 14px",background:"rgba(0,0,0,0.25)",borderRadius:8,marginBottom:14}}>
      <Slider label="temperature" val={T}    min={0.1} max={2.0} step={0.05} fmt={v=>v.toFixed(2)}      on={setT}    c={C.orange}/>
      <Slider label="top-k"       val={topK} min={1}   max={10}  step={1}    fmt={v=>v.toFixed(0)}      on={setTopK} c={C.cyan}/>
      <Slider label="top-p (nucleus)" val={topP} min={0.1} max={1.0} step={0.05} fmt={v=>v.toFixed(2)}  on={setTopP} c={C.green}/>
    </div>

    {/* Distribution */}
    <Label>候选概率分布（灰条 = 原始 softmax，彩色条 = 过滤+归一化后）</Label>
    <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.25)",borderRadius:8,marginBottom:12}}>
      {CANDIDATES.map((c,i) => <Bar key={i} tok={c.tok} prob={finalProbs[i]} base={baseProbs[i]} kept={keepP.has(i)} idx={i}/>)}
      <div style={{marginTop:8,paddingTop:6,borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",fontSize:9,color:"#666"}}>
        <span>保留 {keepP.size}/{CANDIDATES.length} 个候选</span>
        <span>累计概率 {(finalProbs.reduce((a,b)=>a+b,0)*100).toFixed(0)}%（归一化后必为 100%）</span>
      </div>
    </div>

    {/* Mood */}
    <div style={{padding:"10px 12px",borderRadius:6,background:mood.c+"10",border:"1px solid "+mood.c+"33",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:4}}>
        <span style={{color:"#aaa"}}>当前氛围</span>
        <span style={{fontWeight:700,...M,color:mood.c}}>{mood.label}</span>
      </div>
      <div style={{fontSize:10,color:"#999",lineHeight:1.6}}>{mood.why}</div>
    </div>

    {/* Cheatsheet */}
    <div style={{fontSize:10,color:"#999",lineHeight:1.7,padding:"8px 10px",background:"rgba(255,255,255,0.025)",borderRadius:6,border:"1px dashed rgba(255,255,255,0.06)"}}>
      <div style={{color:"#bbb",fontWeight:600,marginBottom:4}}>📌 速查</div>
      • <Acc c={C.orange}>temperature → 0</Acc>：贪心解码（greedy / argmax），完全确定。<br/>
      • <Acc c={C.cyan}>top-k=k</Acc>：只保留概率最高的 k 个。<br/>
      • <Acc c={C.green}>top-p=p</Acc>：保留累计概率达到 p 的最少 token（nucleus / 核采样）。<br/>
      • 实践：通常 <Acc c={C.purple}>top-k=50, top-p=0.9</Acc> 兼顾，再用 temperature 调风格。
    </div>
  </Card>;
}

// ─── THROUGHPUT × LATENCY SANDBOX ──────────────────────────────────
function Perf() {
  const [batch, setBatch] = useState(1);
  const [model, setModel] = useState("13B");
  const [ctx, setCtx] = useState(2048);

  const MODELS = {
    "7B":  { params_B: 7,  weights_GB: 14, kv_per_tok_KB: 256 },
    "13B": { params_B: 13, weights_GB: 26, kv_per_tok_KB: 320 },
    "70B": { params_B: 70, weights_GB: 140, kv_per_tok_KB: 320 },
  };
  const m = MODELS[model];
  const HBM_BW = 2000;        // GB/s (A100 SXM)
  const FLOPS_T = 312;        // TFLOPS FP16
  const GPU_MEM = model === "70B" ? 320 : 80;  // 70B needs 4×A100, others 1×

  const kv_GB = batch * ctx * m.kv_per_tok_KB / 1024 / 1024;
  const total_mem_GB = m.weights_GB + kv_GB;
  const oom = total_mem_GB > GPU_MEM * 0.9;

  // TPOT decomposition
  const mem_per_step_GB = m.weights_GB + kv_GB;       // every decode step rereads weights + all KV
  const tpot_mem_ms = mem_per_step_GB / HBM_BW * 1000;
  const tpot_compute_ms = (2 * m.params_B * batch) / (FLOPS_T * 1000) * 1000;
  const tpot_ms = Math.max(8, tpot_mem_ms, tpot_compute_ms) + 2;
  const bottleneck = tpot_compute_ms > tpot_mem_ms ? "compute-bound" : "memory-bound";

  // Throughput (output tokens per second across all requests)
  const throughput = (batch * 1000) / tpot_ms;

  // Prefill (TTFT) — compute-bound at typical prompt lengths
  const ttft_ms = (2 * m.params_B * batch * ctx) / (FLOPS_T * 1000) * 1000 + 50;

  // Per-user perceived latency vs throughput tradeoff
  const per_user_tps = 1000 / tpot_ms;     // tokens/s a single user sees

  const Bar = ({label, value, max, c, unit, warn}) => {
    const pct = Math.min(100, value / max * 100);
    return <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}>
        <span style={{color:"#888"}}>{label}</span>
        <span style={{color:warn?C.red:c,fontWeight:700,...M}}>{value.toFixed(value<10?2:value<100?1:0)} {unit}</span>
      </div>
      <div style={{height:8,borderRadius:4,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",background:warn?C.red:c,transition:"all 0.25s",borderRadius:4,boxShadow:`0 0 8px ${warn?C.red:c}66`}}/>
      </div>
    </div>;
  };

  return <Card color={C.cyan}>
    <div style={{fontSize:11,color:"#aaa",marginBottom:12,lineHeight:1.7}}>
      拖动 <Acc c={C.orange}>batch_size</Acc>，看四条曲线如何此消彼长。
      <br/>核心 trade-off：<Acc c={C.green}>批大 → 吞吐高</Acc>，但 <Acc c={C.red}>每个用户的延迟也升高</Acc>。
    </div>

    {/* Controls */}
    <div style={{padding:"12px 14px",background:"rgba(0,0,0,0.3)",borderRadius:8,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,fontSize:11}}>
        <span style={{color:"#aaa"}}>模型</span>
        <div style={{display:"flex",gap:4}}>
          {Object.keys(MODELS).map(k => <button key={k} onClick={()=>setModel(k)} style={{padding:"3px 10px",borderRadius:4,fontSize:10,fontWeight:600,cursor:"pointer",border:"1px solid "+(model===k?C.cyan+"66":"rgba(255,255,255,0.1)"),background:model===k?C.cyan+"22":"transparent",color:model===k?C.cyan:"#888"}}>Llama {k}</button>)}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,fontSize:11}}>
        <span style={{color:"#aaa"}}>上下文 ctx</span>
        <div style={{display:"flex",gap:4}}>
          {[1024, 2048, 4096, 8192].map(k => <button key={k} onClick={()=>setCtx(k)} style={{padding:"3px 10px",borderRadius:4,fontSize:10,fontWeight:600,cursor:"pointer",border:"1px solid "+(ctx===k?C.cyan+"66":"rgba(255,255,255,0.1)"),background:ctx===k?C.cyan+"22":"transparent",color:ctx===k?C.cyan:"#888",...M}}>{k>=1024?(k/1024)+"k":k}</button>)}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,marginTop:10}}>
        <span style={{color:"#aaa"}}>batch_size</span>
        <span style={{color:C.orange,fontSize:14,fontWeight:700,...M}}>{batch}</span>
      </div>
      <input type="range" min="1" max="128" value={batch} onChange={e=>setBatch(parseInt(e.target.value))}
        style={{width:"100%",accentColor:C.orange,marginTop:4}}/>
    </div>

    {/* Metrics */}
    <Bar label="TTFT (首 token 时延)"  value={ttft_ms}        max={6000} c={C.orange} unit="ms" warn={ttft_ms>3000}/>
    <Bar label="TPOT (每 token 时延)"  value={tpot_ms}        max={200}  c={C.purple} unit="ms" warn={tpot_ms>100}/>
    <Bar label="单用户感知速度"         value={per_user_tps}   max={80}   c={C.blue}   unit="tok/s"/>
    <Bar label="系统总吞吐"            value={throughput}     max={1500} c={C.green}  unit="tok/s"/>
    <Bar label={`显存占用（${GPU_MEM} GB 上限）`} value={total_mem_GB} max={GPU_MEM} c={C.red} unit="GB" warn={oom}/>

    {/* Bottleneck callout */}
    <div style={{padding:"10px 12px",borderRadius:6,marginTop:6,background:bottleneck==="compute-bound"?C.green+"10":C.purple+"10",border:"1px solid "+(bottleneck==="compute-bound"?C.green+"33":C.purple+"33")}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:4}}>
        <span style={{color:"#aaa"}}>当前瓶颈</span>
        <span style={{fontWeight:700,...M,color:bottleneck==="compute-bound"?C.green:C.purple}}>{bottleneck.toUpperCase()}</span>
      </div>
      <div style={{fontSize:10,color:"#888",lineHeight:1.6}}>
        {bottleneck==="memory-bound"
          ? <>每步都要把 <b style={{color:C.purple}}>{m.weights_GB} GB 权重 + {kv_GB.toFixed(1)} GB KV</b> 从 HBM 读到 SRAM。算力闲置，扩 batch 几乎免费。</>
          : <>权重已多用户分摊，<b style={{color:C.green}}>张量核被打满</b>。再扩 batch 会让单用户感知速度变慢。</>}
      </div>
    </div>

    {oom && <div style={{marginTop:8,padding:"8px 10px",background:C.red+"15",border:"1px solid "+C.red+"55",borderRadius:6,fontSize:10,color:C.red,fontWeight:600}}>
      ⚠️ OOM：显存超出 {GPU_MEM} GB 上限。生产环境靠 PagedAttention（vLLM）+ tensor parallel 缓解。
    </div>}

    <div style={{marginTop:14,fontSize:9,color:"#555",lineHeight:1.7}}>
      📌 数值基于 A100 SXM（HBM 2 TB/s · 312 TFLOPS FP16）的简化估算。真实系统还要考虑 PagedAttention、Continuous Batching、speculative decoding。
    </div>
  </Card>;
}

// ─── TOKENIZE & EMBEDDING (micro-flow) ─────────────────────────────
function Tokenize() {
  const [step, setStep] = useState(0);
  const [hov, setHov] = useState(null);
  const [auto, setAuto] = useState(false);
  const timer = useRef(null);

  // Deterministic fake tokenizer: text → id
  const idOf = (t) => {
    let h = 7;
    for (const ch of t) h = (h * 31 + ch.charCodeAt(0)) | 0;
    return Math.abs(h) % 49000 + 1000;
  };
  // Deterministic fake embedding (6-dim preview of a 4096-dim vector)
  const embOf = (t) => {
    const id = idOf(t);
    return Array.from({length: 6}, (_, i) => {
      const v = Math.sin(id * 0.137 + i * 1.61) * 0.85;
      return (v >= 0 ? "+" : "") + v.toFixed(2);
    });
  };

  const ids = P_TOKENS.map(idOf);
  const embs = P_TOKENS.map(embOf);
  const D_MODEL = 4096;
  const VOCAB = 50257;

  useEffect(() => {
    if (!auto) return;
    timer.current = setInterval(() => {
      setStep(s => {
        if (s >= 3) { setAuto(false); return s; }
        return s + 1;
      });
    }, 1300);
    return () => clearInterval(timer.current);
  }, [auto]);

  const reset = () => { setStep(0); setAuto(false); setHov(null); };
  const start = () => { setStep(0); setAuto(true); };

  const stepLabels = ["1. 原始文本", "2. Tokenize 切分", "3. 查 Vocab → token id", "4. Embedding lookup → 向量"];

  return <Card color={C.cyan}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:11,color:"#aaa"}}>把人类文字下沉到 GPU 能算的浮点数：每个 token 都要经历 4 步</div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={start} style={{fontSize:10,padding:"4px 10px",borderRadius:5,border:"1px solid "+C.cyan+"55",background:C.cyan+"15",color:C.cyan,cursor:"pointer",fontWeight:600}}>▶ 自动播放</button>
        <button onClick={reset} style={{fontSize:10,padding:"4px 10px",borderRadius:5,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"#888",cursor:"pointer"}}>↺ 重置</button>
      </div>
    </div>

    <div style={{display:"flex",gap:4,marginBottom:14}}>
      {stepLabels.map((l,i) => <div key={i} onClick={()=>{setStep(i);setAuto(false);}} style={{flex:1,fontSize:9,padding:"5px 4px",textAlign:"center",borderRadius:4,cursor:"pointer",background:step>=i?C.cyan+"22":"rgba(255,255,255,0.04)",border:"1px solid "+(step===i?C.cyan+"66":"transparent"),color:step>=i?C.cyan:"#666",fontWeight:600,transition:"all 0.3s"}}>{l}</div>)}
    </div>

    {/* Step 1: raw text */}
    <Label>原始文本</Label>
    <div style={{padding:"12px 14px",background:"rgba(0,0,0,0.3)",borderRadius:8,fontSize:13,color:"#ddd",marginBottom:14,...M}}>"{PROMPT}"</div>

    {/* Step 2: tokens */}
    {step >= 1 && <div style={{animation:"fadeIn 0.5s"}}>
      <Label>Tokenize 切分（BPE / SentencePiece）</Label>
      <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.25)",borderRadius:8,marginBottom:14,lineHeight:2}}>
        {P_TOKENS.map((t,i) => <span key={i} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}>
          <Chip t={t} hl={hov===i} c={C.cyan} idx={i}/>
        </span>)}
      </div>
    </div>}

    {/* Step 3: ids */}
    {step >= 2 && <div style={{animation:"fadeIn 0.5s"}}>
      <Label>查 Vocab（共 {VOCAB.toLocaleString()} 个 token）→ id</Label>
      <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.25)",borderRadius:8,marginBottom:14,display:"flex",flexWrap:"wrap",gap:6}}>
        {P_TOKENS.map((t,i) => <div key={i} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"4px 7px",borderRadius:5,background:hov===i?C.cyan+"22":"rgba(255,255,255,0.04)",border:"1px solid "+(hov===i?C.cyan+"55":"rgba(255,255,255,0.06)"),transition:"all 0.2s",cursor:"default"}}>
          <span style={{fontSize:9,color:"#888"}}>{t}</span>
          <span style={{fontSize:11,fontWeight:600,color:C.cyan,...M}}>{ids[i]}</span>
        </div>)}
      </div>
    </div>}

    {/* Step 4: embeddings */}
    {step >= 3 && <div style={{animation:"fadeIn 0.5s"}}>
      <Label>Embedding 矩阵 lookup（每行 d={D_MODEL.toLocaleString()}）</Label>
      <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.3)",borderRadius:8,marginBottom:10,overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,...M}}>
          <thead><tr style={{color:"#666",fontSize:9}}>
            <th style={{textAlign:"left",padding:"3px 6px"}}>token</th>
            <th style={{textAlign:"left",padding:"3px 6px"}}>id</th>
            <th colSpan={6} style={{textAlign:"left",padding:"3px 6px"}}>embedding[0..5]</th>
            <th style={{textAlign:"left",padding:"3px 6px"}}>...</th>
          </tr></thead>
          <tbody>{P_TOKENS.map((t,i) => <tr key={i} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} style={{background:hov===i?C.cyan+"15":"transparent",transition:"background 0.2s"}}>
            <td style={{padding:"3px 6px",color:"#bbb"}}>{t}</td>
            <td style={{padding:"3px 6px",color:C.cyan,fontWeight:600}}>{ids[i]}</td>
            {embs[i].map((v,j) => <td key={j} style={{padding:"3px 6px",color:v.startsWith("+")?C.green:C.red}}>{v}</td>)}
            <td style={{padding:"3px 6px",color:"#555"}}>(d={D_MODEL.toLocaleString()})</td>
          </tr>)}</tbody>
        </table>
      </div>
      <div style={{padding:"8px 10px",background:C.cyan+"08",border:"1px solid "+C.cyan+"22",borderRadius:6,fontSize:10,color:"#bbb",lineHeight:1.7}}>
        <span style={{color:C.cyan,fontWeight:600}}>形状：</span>
        [{P_TOKENS.length} tokens] × [{D_MODEL.toLocaleString()} dims] ={" "}
        <Acc c={C.orange}>{(P_TOKENS.length * D_MODEL * 2 / 1024).toFixed(1)} KB</Acc>{" "}
        (FP16) → 进入 Transformer 第一层
      </div>
    </div>}

    {step >= 3 && <div style={{marginTop:14,padding:"10px 12px",background:"rgba(255,255,255,0.025)",borderRadius:8,border:"1px dashed rgba(255,255,255,0.08)",fontSize:10,color:"#999",lineHeight:1.7}}>
      <div style={{color:"#bbb",fontWeight:600,marginBottom:4}}>💡 关键事实</div>
      • Embedding 矩阵 W_E ∈ ℝ^[V × d]，参数量 = {VOCAB.toLocaleString()} × {D_MODEL.toLocaleString()} ≈ <Acc c={C.orange}>{((VOCAB*D_MODEL)/1e6).toFixed(0)}M</Acc>，与输出 LM Head 通常 <Acc c={C.green}>weight tying（共享）</Acc>。<br/>
      • Tokenize 是<Acc c={C.purple}>无损可逆</Acc>的离散映射；Embedding 是<Acc c={C.purple}>有损可学</Acc>的连续映射。<br/>
      • 中文 1 字常 = 1~3 token；英文 1 word ≈ 1.3 token。所以 <Acc c={C.red}>计费按 token 不按字</Acc>。
    </div>}
  </Card>;
}
